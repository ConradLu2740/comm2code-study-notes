# GitHub Actions CI/CD for shortlink
# 触发: push / pull_request 到 main 分支
# Jobs 串行执行: test -> build -> docker (docker 仅在 push 到 main 时触发)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 全局权限设置: 最小权限原则
# docker job 需要 packages:write 推镜像,这里给到 workflow 级,test/build 不会用到
permissions:
  contents: read

jobs:
  # ============== Job 1: 跑单元测试 ==============
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 JDK 17, 用 Eclipse Temurin 发行版
      # cache: maven 自动缓存 ~/.m2 目录(根据 pom.xml hash 生成 cache key)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # -B = batch mode, 非交互式输出, 适合 CI 环境
      - name: Run unit tests
        run: mvn -B test

      # 上传 Surefire 测试报告, 即使测试失败也上传 (if: always)
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: warn
          retention-days: 7

  # ============== Job 2: 打包 JAR ==============
  # needs: test 表示必须等 test job 成功后才执行 (串行)
  build:
    name: Build JAR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 同样配置 JDK 17 + maven cache
      # 缓存命中可节省 1-2 分钟依赖下载时间
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # 跳过测试, 因为 test job 已经跑过了
      - name: Package JAR
        run: mvn -B package -DskipTests

      # 上传 jar 作为 artifact, 供后续 deploy/release 使用
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: shortlink-jar
          path: target/*.jar
          if-no-files-found: error
          retention-days: 14

  # ============== Job 3: 构建并推送 Docker 镜像到 ghcr.io ==============
  # needs: build 等待 build 成功
  # if 条件: 仅在 push 到 main 时触发, PR 不构建镜像
  docker:
    name: Build & push Docker image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # 推送到 ghcr.io 需要 packages 写权限
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Docker Buildx (推荐方式, 替代 earthly/actions-setup-binfmt)
      # Buildx 支持更高级的构建特性: cache 导出, multi-stage 缓存等
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 ghcr.io (GitHub Container Registry)
      # 使用内置 GITHUB_TOKEN, 无需额外配置 secret
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取镜像元数据 (tags, labels)
      # 自动生成: :latest (default branch) + :${{ github.sha }} + branch refs
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ConradLu2740/shortlink
          tags: |
            # 默认分支打 :latest 标签
            type=raw,value=latest,enable={{is_default_branch}}
            # 每次提交打 sha 长标签
            type=sha,prefix=,suffix=
            # 分支名也作为标签
            type=ref,event=branch

      # 构建并推送镜像
      # cache-from / cache-to: 使用 GitHub Actions 缓存后端, 加速后续构建
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GHA 内置缓存, mode=max 包含中间层
          cache-from: type=gha
          cache-to: type=gha,mode=max
